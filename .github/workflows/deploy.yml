name: Deploy to Cloudflare

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
      - run: pip install -e ".[dev,mcp]"
      - run: pytest -v --tb=short

  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Install wrangler and pywrangler
        run: |
          npm install -g wrangler@latest
          uv tool install workers-py

      - name: Bundle formula data from registry
        run: |
          pip install pyyaml
          git clone https://x-access-token:${{ secrets.ORG_TOKEN }}@github.com/agentic-stacks/registry /tmp/registry
          python scripts/generate_formula_data.py --input /tmp/registry/stacks --output src/web/formula_data.py
          cat src/web/formula_data.py | head -5

      - name: Deploy to Cloudflare Workers
        run: pywrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
