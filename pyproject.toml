[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "agentic-stacks"
version = "0.1.0"
description = "Agentic Stacks"
requires-python = ">=3.11"
authors = [
    { name = "Agentic Stacks" },
]
dependencies = [
    "pyyaml>=6.0",
    "jsonschema>=4.20",
    "click>=8.1",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-tmp-files>=0.0.2",
]

[project.scripts]
agentic-stacks = "agentic_stacks_cli:main"

[tool.hatch.build.targets.wheel]
packages = ["src/agentic_stacks", "src/agentic_stacks_cli"]

[tool.pytest.ini_options]
testpaths = ["tests"]
