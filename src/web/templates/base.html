<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Agentic Stacks{% endblock %}</title>
    <meta name="description" content="{% block meta_description %}Composed domain expertise for AI agents and humans. Browse, search, and install stacks for OpenStack, Kubernetes, Ceph, Docker, and hardware management.{% endblock %}">
    <meta property="og:title" content="{% block og_title %}Agentic Stacks{% endblock %}">
    <meta property="og:description" content="{% block og_description %}Composed domain expertise for AI agents and humans.{% endblock %}">
    <meta property="og:type" content="website">
    <meta property="og:url" content="{{ request.url }}">
    <meta property="og:image" content="{% block og_image %}/static/og-image.svg{% endblock %}">
    <meta property="og:site_name" content="Agentic Stacks">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="{% block twitter_title %}Agentic Stacks{% endblock %}">
    <meta name="twitter:description" content="{% block twitter_description %}Installable skill packs that give AI agents deep domain expertise.{% endblock %}">
    <link rel="canonical" href="{{ request.url }}">
    <style>
/* Agentic Stacks — pre-compiled Tailwind utilities */
*, *::before, *::after { box-sizing: border-box; }
html { line-height: 1.5; -webkit-text-size-adjust: 100%; font-family: ui-sans-serif, system-ui, sans-serif, "Apple Color Emoji", "Segoe UI Emoji"; }
body { margin: 0; }
h1, h2, h3, p, pre, ul, ol, details, table { margin: 0; }
a { color: inherit; text-decoration: inherit; }
pre, code { font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, monospace; font-size: 1em; }
button { font: inherit; color: inherit; background: transparent; border: none; padding: 0; cursor: pointer; }
img, svg { display: block; max-width: 100%; }
table { border-collapse: collapse; }
summary { cursor: pointer; }
::-webkit-input-placeholder { color: inherit; opacity: 0.5; }
::placeholder { color: inherit; opacity: 0.5; }
.block { display: block; }
.inline { display: inline; }
.flex { display: flex; }
.grid { display: grid; }
.hidden { display: none; }
.table-cell { display: table-cell; }
.sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0,0,0,0); white-space: nowrap; border-width: 0; }
.flex-1 { flex: 1 1 0%; }
.flex-col { flex-direction: column; }
.flex-wrap { flex-wrap: wrap; }
.shrink-0 { flex-shrink: 0; }
.grid-cols-1 { grid-template-columns: repeat(1, minmax(0, 1fr)); }
.items-center { align-items: center; }
.items-start { align-items: flex-start; }
.justify-between { justify-content: space-between; }
.justify-center { justify-content: center; }
.align-top { vertical-align: top; }
.gap-2 { gap: 0.5rem; }
.gap-3 { gap: 0.75rem; }
.gap-4 { gap: 1rem; }
.gap-6 { gap: 1.5rem; }
.space-y-1 > * + * { margin-top: 0.25rem; }
.space-y-2 > * + * { margin-top: 0.5rem; }
.space-y-3 > * + * { margin-top: 0.75rem; }
.space-y-6 > * + * { margin-top: 1.5rem; }
.space-y-8 > * + * { margin-top: 2rem; }
.w-full { width: 100%; }
.w-16 { width: 4rem; }
.w-24 { width: 6rem; }
.min-w-0 { min-width: 0; }
.min-h-screen { min-height: 100vh; }
.max-w-md { max-width: 28rem; }
.max-w-xl { max-width: 36rem; }
.max-w-2xl { max-width: 42rem; }
.max-w-3xl { max-width: 48rem; }
.max-w-6xl { max-width: 72rem; }
.max-w-none { max-width: none; }
.p-3 { padding: 0.75rem; }
.p-4 { padding: 1rem; }
.p-6 { padding: 1.5rem; }
.p-8 { padding: 2rem; }
.px-2 { padding-left: 0.5rem; padding-right: 0.5rem; }
.px-3 { padding-left: 0.75rem; padding-right: 0.75rem; }
.px-4 { padding-left: 1rem; padding-right: 1rem; }
.px-6 { padding-left: 1.5rem; padding-right: 1.5rem; }
.py-0\.5 { padding-top: 0.125rem; padding-bottom: 0.125rem; }
.py-1 { padding-top: 0.25rem; padding-bottom: 0.25rem; }
.py-1\.5 { padding-top: 0.375rem; padding-bottom: 0.375rem; }
.py-2 { padding-top: 0.5rem; padding-bottom: 0.5rem; }
.py-3 { padding-top: 0.75rem; padding-bottom: 0.75rem; }
.py-4 { padding-top: 1rem; padding-bottom: 1rem; }

.pb-2 { padding-bottom: 0.5rem; }
.pb-3 { padding-bottom: 0.75rem; }
.pr-4 { padding-right: 1rem; }
.pt-8 { padding-top: 2rem; }
.mx-auto { margin-left: auto; margin-right: auto; }
.my-3 { margin-top: 0.75rem; margin-bottom: 0.75rem; }
.my-4 { margin-top: 1rem; margin-bottom: 1rem; }
.my-6 { margin-top: 1.5rem; margin-bottom: 1.5rem; }
.mb-1 { margin-bottom: 0.25rem; }
.mb-2 { margin-bottom: 0.5rem; }
.mb-3 { margin-bottom: 0.75rem; }
.mb-4 { margin-bottom: 1rem; }
.mb-6 { margin-bottom: 1.5rem; }
.mb-8 { margin-bottom: 2rem; }
.mb-10 { margin-bottom: 2.5rem; }
.mb-12 { margin-bottom: 3rem; }
.ml-2 { margin-left: 0.5rem; }
.mt-0\.5 { margin-top: 0.125rem; }
.mt-1 { margin-top: 0.25rem; }
.mt-2 { margin-top: 0.5rem; }
.mt-3 { margin-top: 0.75rem; }
.mt-4 { margin-top: 1rem; }
.mt-6 { margin-top: 1.5rem; }
.mt-8 { margin-top: 2rem; }
.mt-10 { margin-top: 2.5rem; }
.mt-12 { margin-top: 3rem; }
.text-xs { font-size: 0.75rem; line-height: 1rem; }
.text-sm { font-size: 0.875rem; line-height: 1.25rem; }
.text-base { font-size: 1rem; line-height: 1.5rem; }
.text-lg { font-size: 1.125rem; line-height: 1.75rem; }
.text-xl { font-size: 1.25rem; line-height: 1.75rem; }
.text-2xl { font-size: 1.5rem; line-height: 2rem; }
.text-3xl { font-size: 1.875rem; line-height: 2.25rem; }
.text-5xl { font-size: 3rem; line-height: 1; }
.font-medium { font-weight: 500; }
.font-semibold { font-weight: 600; }
.font-bold { font-weight: 700; }
.uppercase { text-transform: uppercase; }
.tracking-wider { letter-spacing: 0.05em; }
.text-left { text-align: left; }
.text-center { text-align: center; }
.text-right { text-align: right; }
.whitespace-nowrap { white-space: nowrap; }
.line-clamp-1 { display: -webkit-box; -webkit-box-orient: vertical; -webkit-line-clamp: 1; overflow: hidden; }
.list-disc { list-style-type: disc; }
.list-decimal { list-style-type: decimal; }
.list-inside { list-style-position: inside; }
.text-white { color: #fff; }
.text-gray-100 { color: #f3f4f6; }
.text-gray-300 { color: #d1d5db; }
.text-gray-400 { color: #9ca3af; }
.text-gray-500 { color: #6b7280; }
.text-gray-600 { color: #4b5563; }
.text-emerald-300 { color: #6ee7b7; }
.text-emerald-400 { color: #34d399; }
.text-yellow-400 { color: #facc15; }
.text-yellow-500 { color: #eab308; }
.bg-gray-800 { background-color: #1f2937; }
.bg-gray-900 { background-color: #111827; }
.bg-gray-950 { background-color: #030712; }
.bg-emerald-900 { background-color: #064e3b; }
.bg-emerald-900\/50 { background-color: rgb(6 78 59 / 0.5); }
.border { border-width: 1px; border-style: solid; }
.border-b { border-bottom-width: 1px; border-bottom-style: solid; }
.border-t { border-top-width: 1px; border-top-style: solid; }
.border-gray-700 { border-color: #374151; }
.border-gray-800 { border-color: #1f2937; }
.border-gray-800\/50 { border-color: rgb(31 41 55 / 0.5); }
.border-emerald-800 { border-color: #065f46; }
.border-yellow-900 { border-color: #713f12; }
.rounded { border-radius: 0.25rem; }
.rounded-lg { border-radius: 0.5rem; }
.rounded-xl { border-radius: 0.75rem; }
.rounded-full { border-radius: 9999px; }
.overflow-x-auto { overflow-x: auto; }
.overflow-x-hidden { overflow-x: hidden; }
.transition { transition: all 150ms cubic-bezier(0.4, 0, 0.2, 1); }
.cursor-pointer { cursor: pointer; }
.placeholder-gray-500::placeholder { color: #6b7280; }
.focus\:outline-none:focus { outline: none; }
.focus\:border-emerald-400:focus { border-color: #34d399; }
.hover\:text-white:hover { color: #fff; }
.hover\:text-emerald-400:hover { color: #34d399; }
.hover\:underline:hover { text-decoration: underline; }
.hover\:no-underline:hover { text-decoration: none; }
.hover\:bg-gray-900\/50:hover { background-color: rgb(17 24 39 / 0.5); }
.hover\:border-gray-500:hover { border-color: #6b7280; }
.group:hover .group-hover\:text-emerald-400 { color: #34d399; }
details[open] > summary .group-open\:text-emerald-400,
.group.open .group-open\:text-emerald-400 { color: #34d399; }
details.group[open] > summary { color: #34d399; }
@media (min-width: 640px) {
  .sm\:inline { display: inline; }
  .sm\:table-cell { display: table-cell; }
  .sm\:flex-row { flex-direction: row; }
  .sm\:grid-cols-2 { grid-template-columns: repeat(2, minmax(0, 1fr)); }
  .sm\:gap-3 { gap: 0.75rem; }
  .sm\:gap-6 { gap: 1.5rem; }
  .sm\:max-w-md { max-width: 28rem; }
  .sm\:p-4 { padding: 1rem; }
  .sm\:px-6 { padding-left: 1.5rem; padding-right: 1.5rem; }
  .sm\:py-8 { padding-top: 2rem; padding-bottom: 2rem; }
  .sm\:py-16 { padding-top: 4rem; padding-bottom: 4rem; }
  .sm\:text-sm { font-size: 0.875rem; line-height: 1.25rem; }
  .sm\:text-base { font-size: 1rem; line-height: 1.5rem; }
  .sm\:text-xl { font-size: 1.25rem; line-height: 1.75rem; }
  .sm\:text-3xl { font-size: 1.875rem; line-height: 2.25rem; }
  .sm\:text-4xl { font-size: 2.25rem; line-height: 2.5rem; }
  .sm\:text-5xl { font-size: 3rem; line-height: 1; }
}
@media (min-width: 768px) {
  .md\:grid-cols-2 { grid-template-columns: repeat(2, minmax(0, 1fr)); }
  .md\:table-cell { display: table-cell; }
}
@media (min-width: 1024px) {
  .lg\:grid-cols-3 { grid-template-columns: repeat(3, minmax(0, 1fr)); }
  .lg\:grid-cols-4 { grid-template-columns: repeat(4, minmax(0, 1fr)); }
}
.prose { line-height: 1.75; }
.prose h2 { font-size: 1.5rem; font-weight: 700; margin-top: 2rem; margin-bottom: 1rem; }
.prose h3 { font-size: 1.25rem; font-weight: 600; margin-top: 1.5rem; margin-bottom: 0.75rem; }
.prose p { margin-top: 1rem; margin-bottom: 1rem; }
.prose ul, .prose ol { margin-top: 0.75rem; margin-bottom: 0.75rem; padding-left: 1.5rem; }
.prose li { margin-top: 0.25rem; margin-bottom: 0.25rem; }
.prose pre { margin-top: 1rem; margin-bottom: 1rem; padding: 1rem; border-radius: 0.5rem; overflow-x: auto; }
.prose code { font-size: 0.875em; }
.prose a { color: #34d399; text-decoration: underline; }
.prose a:hover { color: #6ee7b7; }
.prose-invert { color: #d1d5db; }
.prose-invert pre { background-color: #1f2937; }
.prose-invert h2, .prose-invert h3 { color: #f3f4f6; }
.stack-card { transition: border-color 0.2s; }
.stack-card:hover { border-color: rgba(110, 231, 183, 0.4); }
.tab-active { border-bottom: 2px solid #6ee7b7; color: #6ee7b7; }
code { background: rgba(255, 255, 255, 0.06); padding: 2px 6px; border-radius: 4px; font-size: 0.9em; }
pre code { background: none; padding: 0; }
pre { overflow-x: auto; -webkit-overflow-scrolling: touch; }

<body class="bg-gray-950 text-gray-100 min-h-screen flex flex-col overflow-x-hidden">
    <nav class="border-b border-gray-800 px-4 sm:px-6 py-4">
        <div class="max-w-6xl mx-auto flex items-center justify-between">
            <a href="/" class="text-lg sm:text-xl font-bold text-white shrink-0">Agentic Stacks</a>
            <div class="flex items-center gap-3 sm:gap-6 text-sm sm:text-base">
                <a href="/stacks" class="text-gray-400 hover:text-white transition">Browse</a>
                <a href="/docs/getting-started" class="text-gray-400 hover:text-white transition">Docs</a>
                <a href="/docs/faq" class="text-gray-400 hover:text-white transition">FAQ</a>
                <a href="/about" class="text-gray-400 hover:text-white transition">About</a>
                <a href="https://github.com/agentic-stacks" class="text-gray-400 hover:text-white transition">GitHub</a>
            </div>
        </div>

    <main class="flex-1 max-w-6xl mx-auto w-full px-4 sm:px-6 py-6 sm:py-8 min-w-0">
        {% block content %}{% endblock %}
    </main>
    <footer class="border-t border-gray-800 px-4 sm:px-6 py-6 text-center text-gray-500 text-sm">
        Agentic Stacks — composed domain expertise for AI agents and humans.
    </footer>
